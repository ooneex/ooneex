name: Main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install bun
        uses: oven-sh/setup-bun@v2

      # Setup Node with cache for pnpm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      # Setup pnpm (pin version for reproducibility)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      # Install dependencies (respecting lockfile)
      - name: Install dependencies
        run: pnpm -r install --frozen-lockfile

      - name: Install Nx
        run: pnpm add -g nx@latest

      # Run lint command
      - name: Run lint
        run: bun run lint

      # Run tests
      - name: Run tests
        run: bun run test

