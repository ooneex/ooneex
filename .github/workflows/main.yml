name: Main
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun --workspace install
      - name: Run lint
        run: bun run lint
      - name: Run tests
        run: bun run test

  release:
    name: Release ${{ matrix.package }} package
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      HUSKY: 0
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        include:
          - package: utils
          - package: core
    steps:
      - name: Skip if not matching tag
        run: |
          if [[ ! "${{ github.ref }}" == refs/tags/${{ matrix.package }}* ]]; then
            echo "Skipping ${{ matrix.package }} - tag doesn't match"
            exit 78
          fi
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun --workspace install
      - name: Setup node
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish ${{ matrix.package }} package on NPM
        run: cd packages/${{ matrix.package }} && bun run publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
